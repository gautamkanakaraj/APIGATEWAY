server:
  port: "8080"

# Centralized Tier Definitions
tiers:
  premium:
    capacity: 50
    fill_rate: 5
  free:
    capacity: 5
    fill_rate: 1

routes:
  - path: "/api/v1/products"
    targets:
      - "http://service-products-1:8081"
      - "http://service-products-2:8083"
  - path: "/api/v1/checkout"
    targets:
      - "http://service-checkout-1:8082"